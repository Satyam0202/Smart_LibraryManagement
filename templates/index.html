<!DOCTYPE html>
<html>
<head>
    <title>Loader Demo</title>
    <style>
        body 
        {
            margin:0;
            font-family:Arial;
            background:#0f172a;
            color:white;
            text-align:center;
        }
        #loader 
        {
            position:fixed;
            width:100%;
            height:100%;
            background:#0f172a;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
        }
        .logo 
        {
            width:220px;
            height:220px;
            margin-bottom:20px;
            animation:zoom 1.5s infinite alternate;
        }
        /* PROGRESS BAR */
        .bar 
        {
            width:350px;
            height:8px;
            background:#334155;
            border-radius:10px;
            overflow:hidden;
        }
        .progress 
        {
            height:100%;
            width:0%;
            background:#22c55e;
            animation:load 5s linear forwards;
        }
        @keyframes load 
        {
            from 
            { 
                width:0%; 
            }
            to 
            { 
                width:100%; 
            }
        }
        @keyframes zoom 
        {
            from
            { 
                transform:scale(0.9);
            }
            to 
            { 
                transform:scale(1.1); 
            }
        }
        #main 
        {
            display:none;
            margin-top:200px;
            font-size:30px;
        }
    </style>
</head>
<body>
<div id="loader">
    <img src="{{ url_for('static', filename='logo.png') }}" class="logo">
    <div class="bar">
        <div class="progress"></div>
    </div>
    <p>Loading...</p>
</div>

<div id="main">


</div>

<script>
    setTimeout(()=> 
    {
        window.location.href="login_page";
    },2000);
</script>
</body>
</html>
